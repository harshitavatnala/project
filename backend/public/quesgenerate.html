<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Question Paper</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="quesgenerate.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
<nav class="navbar">
<div class="navdiv">
<div class="logo">
<a href="frontpage.html">Edu Tech</a>
</div>

<ul>
<li>
<label for="gsearch">Search:</label>
<input type="search" id="gsearch" name="gsearch">
</li>

<li><a href="frontpage.html">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>

<button onclick="location.href='login.html'">LoginIn</button>
<button onclick="location.href='signup.html'">Signup</button>

</ul>
</div>
</nav>
<div class="container mt-5">
<div class="card p-4 shadow">

<h4 class="mb-3">Generate Question Paper</h4>

<form id="classConfigForm">

<!-- Branch -->
<select id="branch" class="form-select mb-3" required>
<option selected disabled>Choose Branch</option>
<option value="First Year Engineering">First Year Engineering</option>
<option value="Computer Engineering">Computer Engineering</option>
<option value="Information Technology">Information Technology</option>
<option value="Electrical Engineering">Electrical Engineering</option>
<option value="Mechanical">Mechanical Engineering</option>
<option value="Civil Engineering">Civil Engineering</option>
<option value="Data Engineering">Data Engineering</option>
</select>

<!-- Semester -->
<select id="semester" class="form-select mb-3" required>
<option selected disabled>Choose Semester</option>
<option value="Semester 1">Semester 1</option>
<option value="Semester 2">Semester 2</option>
<option value="Semester 3">Semester 3</option>
<option value="Semester 4">Semester 4</option>
</select>

<!-- Subject -->
<select id="addSubjectSelect" class="form-select mb-3" required>
<option selected disabled>Choose Subject</option>
</select>

<!-- Chapter
<select id="chapterSelect" class="form-select mb-3" required>
<option selected disabled>Choose Chapter</option>
</select> -->

<!-- Sections -->
<div id="sectionsContainer"></div>

<button type="button" class="btn btn-warning mb-3" onclick="addSection()">+ Add Section</button>

<!-- Difficulty -->
<div class="mb-3">
<label class="fw-bold">Difficulty</label><br>

<input type="radio" name="difficulty" value="easy" checked> Easy
<input type="radio" name="difficulty" value="medium"> Medium
<input type="radio" name="difficulty" value="hard"> Hard
</div>

<button type="submit" class="btn btn-success w-100">Generate Paper</button>

</form>

</div>
</div>

<!-- PDF Preview -->
<div class="container mt-4" id="previewSection" style="display:none;">
<h5>PDF Preview</h5>

<iframe id="pdfPreview" width="100%" height="500px"></iframe>

<br><br>

<a id="downloadBtn" class="btn btn-primary" download="question-paper.pdf">
Download PDF
</a>
</div>


<script src="quesgenerate.js"></script>
</body>

</html>
