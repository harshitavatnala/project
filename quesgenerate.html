<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configure Semester & Subjects</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="quesgenerate.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
<nav class="navbar">
<div class="navdiv">
<div class="logo">
<a href="frontpage.html">Edu Tech</a>
</div>

<ul>
<li>
<label for="gsearch">Search:</label>
<input type="search" id="gsearch" name="gsearch">
</li>

<li><a href="frontpage.html">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>

<button onclick="location.href='login.html'">LoginIn</button>

</ul>
</div>

<div class="container">
<div class="card shadow-lg">

<div class="card-header">
<h4 class="mb-0">Configure semester & Subjects</h4>
</div>

<div class="card-body">

<form id="classConfigForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Select Semester</label>
<select class="form-select" id="semesterSelect">
<option selected disabled>Choose Semester...</option>
<option value="1">Semester 1</option>
<option value="2">Semester 2</option>
<option value="3">Semester 3</option>
<option value="4">Semester 4</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Add Subjects</label>
<select class="form-select" id="addSubjectSelect">
<option selected disabled>Choose Subject...</option>
<option value="C">maths</option>
<option value="C">phys</option>
<option value="C">chem</option>
<option value="C">BEE</option>
<option value="C">Mechanics</option>
<option value="C">PCE</option>
<option value="C">Graphics</option>
<option value="C">Ds(data structure)</option>
<option value="C">AOA</option>
<option value="C">COA</option>
<option value="C">DSGT</option>
<option value="C">OS</option>
<option value="C">DBMS</option>
<option value="C">OE</option>
<option value="C">CT</option>
<option value="C">WT</option>
</select>
</div>

</div>

<div class="mt-4">

<label class="form-label fw-bold">Add Name of the Chapter</label>

<div class="input-group mb-3">
<input type="text" id="subjectInput" class="form-control" placeholder="Enter Chapter Name">
<button class="btn btn-outline-secondary" type="button" id="addSubjectBtn">
Add Name of the Chapter
</button>
</div>

<ul class="list-group" id="subjectList"></ul>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">No. of Questions</label>
<input type="number" class="form-control" id="numQuestions" placeholder="e.g. 10">
</div>

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Marks per Question</label>
<select class="form-select" id="marksPerQuest">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>
</div>

</div>

<div class="mb-3">

<label class="form-label fw-bold d-block">Difficulty Level</label>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="difficulty" value="easy" checked>
<label class="form-check-label">Easy</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="difficulty" value="medium">
<label class="form-check-label">Medium</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="difficulty" value="hard">
<label class="form-check-label">Hard</label>
</div>

</div>

<div class="alert d-flex justify-content-between">
<span>Total Marks:</span>
<span id="totalMarksDisplay" class="badge bg-primary total-badge">0</span>
</div>

<button class="btn btn-success w-100">Generate Paper</button>

</form>

</div>

</div>

</div>

<script>
const numInput = document.getElementById('numQuestions');
const marksInput = document.getElementById('marksPerQuest');
const display = document.getElementById('totalMarksDisplay');

function updateTotal(){
const total = (numInput.value || 0) * (marksInput.value || 0);
display.innerText = total;
}

numInput.addEventListener('input',updateTotal);
marksInput.addEventListener('change',updateTotal);
</script>

</body>
</html>
